<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>관리자 - 박달초등학교 챗봇</title>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }
			body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(180deg, #fffdf8 0%, #f8f3ea 100%); min-height: 100vh; color: #1e293b; }
			.container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
			.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
			.header h1 { font-size: 1.5rem; font-weight: 700; }
			.header a { font-size: 0.875rem; color: #64748b; text-decoration: none; }
			.header a:hover { color: #f59e0b; }
			.card { background: rgba(255,255,255,0.95); border: 1px solid rgba(226,232,240,0.9); border-radius: 1.25rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 8px 30px rgba(148,163,184,0.1); }
			.card h2 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem; }
			.card p { font-size: 0.875rem; color: #64748b; margin-bottom: 1rem; line-height: 1.6; }
			.login-form { display: flex; gap: 0.75rem; }
			.login-form input { flex: 1; padding: 0.75rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.9375rem; outline: none; }
			.login-form input:focus { border-color: #f59e0b; }
			.btn { padding: 0.75rem 1.5rem; border: none; border-radius: 0.75rem; font-size: 0.9375rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
			.btn-primary { background: linear-gradient(135deg, #f59e0b, #22c55e); color: white; }
			.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(245,158,11,0.25); }
			.btn-danger { background: #ef4444; color: white; font-size: 0.8rem; padding: 0.5rem 1rem; }
			.btn-danger:hover { background: #dc2626; }
			.upload-zone { border: 2px dashed #e2e8f0; border-radius: 1rem; padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s; }
			.upload-zone:hover, .upload-zone.dragover { border-color: #f59e0b; background: rgba(245,158,11,0.04); }
			.upload-zone input { display: none; }
			.upload-zone p { color: #64748b; font-size: 0.9375rem; }
			.upload-zone .hint { font-size: 0.8rem; margin-top: 0.5rem; }
			.doc-list { display: flex; flex-direction: column; gap: 0.75rem; }
			.doc-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: rgba(255,255,255,0.8); border: 1px solid #f1f5f9; border-radius: 0.75rem; }
			.doc-item .doc-info { display: flex; flex-direction: column; gap: 0.2rem; }
			.doc-item .doc-name { font-weight: 600; font-size: 0.9375rem; }
			.doc-item .doc-meta { font-size: 0.8rem; color: #94a3b8; }
			.status { padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.875rem; margin-top: 1rem; display: none; }
			.status.success { display: block; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
			.status.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
			.status.loading { display: block; background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
			.empty { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.9375rem; }
			#admin-panel { display: none; }
			.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
			.stat-card { padding: 1rem; background: linear-gradient(135deg, rgba(255,251,235,0.9), rgba(240,253,244,0.9)); border: 1px solid rgba(251,191,36,0.18); border-radius: 1rem; text-align: center; }
			.stat-value { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
			.stat-label { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<h1>관리자 패널</h1>
				<a href="/">챗봇으로 돌아가기</a>
			</div>

			<div id="login-panel" class="card">
				<h2>관리자 로그인</h2>
				<p>관리자 비밀번호를 입력하세요.</p>
				<div class="login-form">
					<input type="password" id="password" placeholder="비밀번호" />
					<button class="btn btn-primary" onclick="login()">로그인</button>
				</div>
				<div id="login-status" class="status"></div>
			</div>

			<div id="admin-panel">
				<div class="stats" id="stats"></div>

				<div class="card">
					<h2>문서 업로드</h2>
					<p>학교 문서(.hwpx)를 업로드하면 자동으로 텍스트를 추출하여 챗봇이 답변에 활용합니다.</p>
					<div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
						<input type="file" id="file-input" accept=".hwpx" multiple onchange="uploadFiles(this.files)" />
						<p>클릭하거나 파일을 끌어다 놓으세요</p>
						<p class="hint">.hwpx 파일만 지원됩니다</p>
					</div>
					<div id="upload-status" class="status"></div>
				</div>

				<div class="card">
					<h2>업로드된 문서</h2>
					<div id="doc-list" class="doc-list">
						<div class="empty">로딩 중...</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			let authToken = localStorage.getItem('admin_token') || '';

			if (authToken) {
				tryAutoLogin();
			}

			async function tryAutoLogin() {
				try {
					const res = await fetch('/api/admin/documents', { headers: { Authorization: 'Bearer ' + authToken } });
					if (res.ok) {
						document.getElementById('login-panel').style.display = 'none';
						document.getElementById('admin-panel').style.display = 'block';
						loadDocuments();
					} else {
						authToken = '';
						localStorage.removeItem('admin_token');
					}
				} catch { /* ignore */ }
			}

			async function login() {
				const pw = document.getElementById('password').value;
				const statusEl = document.getElementById('login-status');
				statusEl.className = 'status loading';
				statusEl.textContent = '확인 중...';

				try {
					const res = await fetch('/api/admin/documents', { headers: { Authorization: 'Bearer ' + pw } });
					if (res.ok) {
						authToken = pw;
						localStorage.setItem('admin_token', pw);
						document.getElementById('login-panel').style.display = 'none';
						document.getElementById('admin-panel').style.display = 'block';
						loadDocuments();
					} else {
						statusEl.className = 'status error';
						statusEl.textContent = '비밀번호가 틀렸습니다.';
					}
				} catch (e) {
					statusEl.className = 'status error';
					statusEl.textContent = '서버 오류: ' + e.message;
				}
			}

			async function loadDocuments() {
				const listEl = document.getElementById('doc-list');
				const statsEl = document.getElementById('stats');

				try {
					const res = await fetch('/api/admin/documents', { headers: { Authorization: 'Bearer ' + authToken } });
					const data = await res.json();

					const knowledgeRes = await fetch('/api/admin/knowledge');
					const knowledgeData = await knowledgeRes.json();

					statsEl.innerHTML = `
						<div class="stat-card"><div class="stat-value">${data.documents.filter(d => !d.pathname.endsWith('.json')).length}</div><div class="stat-label">업로드된 문서</div></div>
						<div class="stat-card"><div class="stat-value">${knowledgeData.totalParagraphs}</div><div class="stat-label">추출된 문단</div></div>
						<div class="stat-card"><div class="stat-value">${knowledgeData.sources.length}</div><div class="stat-label">활용 소스</div></div>
					`;

					const docs = data.documents.filter(d => !d.pathname.endsWith('.extracted.json'));
					if (docs.length === 0) {
						listEl.innerHTML = '<div class="empty">업로드된 문서가 없습니다. 위에서 .hwpx 파일을 업로드해 주세요.</div>';
						return;
					}

					listEl.innerHTML = docs.map(doc => `
						<div class="doc-item">
							<div class="doc-info">
								<span class="doc-name">${doc.filename}</span>
								<span class="doc-meta">${new Date(doc.uploadedAt).toLocaleString('ko-KR')} · ${(doc.size / 1024).toFixed(1)}KB</span>
							</div>
							<button class="btn btn-danger" onclick="deleteDoc('${doc.url}')">삭제</button>
						</div>
					`).join('');
				} catch (e) {
					listEl.innerHTML = '<div class="empty">문서 목록을 불러올 수 없습니다.</div>';
				}
			}

			async function uploadFiles(files) {
				const statusEl = document.getElementById('upload-status');

				for (const file of files) {
					statusEl.className = 'status loading';
					statusEl.textContent = `"${file.name}" 업로드 중...`;

					try {
						const formData = new FormData();
						formData.append('file', file);
						const res = await fetch('/api/admin/documents', {
							method: 'POST',
							headers: { Authorization: 'Bearer ' + authToken },
							body: formData,
						});
						const data = await res.json();

						if (res.ok) {
							statusEl.className = 'status success';
							statusEl.textContent = `"${file.name}" 업로드 완료! ${data.paragraphs}개 문단 추출됨.`;
						} else {
							statusEl.className = 'status error';
							statusEl.textContent = `오류: ${data.error}`;
						}
					} catch (e) {
						statusEl.className = 'status error';
						statusEl.textContent = `업로드 실패: ${e.message}`;
					}
				}

				document.getElementById('file-input').value = '';
				loadDocuments();
			}

			async function deleteDoc(url) {
				if (!confirm('이 문서를 삭제하시겠습니까?')) return;

				try {
					await fetch('/api/admin/documents', {
						method: 'DELETE',
						headers: { Authorization: 'Bearer ' + authToken, 'Content-Type': 'application/json' },
						body: JSON.stringify({ url }),
					});
					loadDocuments();
				} catch (e) {
					alert('삭제 실패: ' + e.message);
				}
			}

			const zone = document.getElementById('upload-zone');
			zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
			zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
			zone.addEventListener('drop', (e) => {
				e.preventDefault();
				zone.classList.remove('dragover');
				uploadFiles(e.dataTransfer.files);
			});
		</script>
	</body>
</html>
